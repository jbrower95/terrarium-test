# .github/workflows/terrarium.yml
name: Terrarium
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}
jobs:
  owner:
    uses: jbrower95/terrarium/.github/workflows/owner.yml@master
    permissions:
      id-token: write
      contents: write
      issues: write
      pull-requests: write
      actions: write
    secrets:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Check secret
        env:
          KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          echo "Secret length: ${#KEY}"
          echo "First 5: ${KEY:0:5}"
