# .github/workflows/terrarium.yml
name: Terrarium
on:
  push:
    branches: [main, master]
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}
jobs:
  owner:
    uses: jbrower95/terrarium/.github/workflows/owner.yml@master
    permissions:
      id-token: write
      contents: write
      issues: write
      pull-requests: write
      actions: write
    secrets:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
